name: noda
description: "Noda — Hierarchical note-taking and revision app for students."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI & Fonts
  google_fonts: ^6.2.1
  animations: ^2.0.12
  flutter_colorpicker: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  shared_preferences: ^2.5.2
  flutter_markdown: ^0.7.7+1
  markdown: ^7.3.1
  flutter_quill: ^11.0.0
  image_picker: ^1.2.1
  flutter_tts: ^4.2.5
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  receive_sharing_intent: ^1.8.1
  flutter_highlighting: ^0.9.0+11.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.4
  custom_lint:
  riverpod_lint: ^2.6.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Logo_Padded.png"
  adaptive_icon_background: "#F6FAFE"
  adaptive_icon_foreground: "assets/Logo_Padded.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F6FAFE"
  image: assets/Logo_Padded.png
  android_12:
    image: assets/Logo_Padded.png
    color: "#F6FAFE"
    icon_background_color: "#F6FAFE"
  color_dark: "#020617"
  image_dark: assets/Logo_Padded.png
  android: true
  ios: true
  fullscreen: true
